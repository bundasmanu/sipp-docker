name: Build and Push Docker image

on:
    push:
        branches:
            - '**'
        tags:
            - '**'
    pull_request:
        branches:
            - main

permissions:
    contents: read ## let's allow the workflow to read the repository contents
    packages: write ## let's allow the workflow to publish and modify packages (required for ghcr.io)

jobs:

    load-env-vars:
      runs-on: ubuntu-latest
      outputs:
        DEBIAN_VERSION: ${{ env.DEBIAN_VERSION }}
        SIPP_VERSION: ${{ env.SIPP_VERSION }}
        BUILD_FLAGS: ${{ env.BUILD_FLAGS }}
        SIPP_SCENARIOS_LOCATION: ${{ env.SIPP_SCENARIOS_LOCATION }}
      steps:
        - uses: actions/checkout@v6

        - name: Load environment variables from .env
          run: grep -v '^#' .env | grep -v '^$' >> $GITHUB_ENV

    build-and-push:
      needs: load-env-vars
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Log in to GitHub Container Registry
          uses: docker/login-action@v3
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

        - name: Log in to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

        - name: Extract Docker tag
          id: extract_tag
          run: |
            if [[ "${GITHUB_REF}" == refs/heads/main ]]; then
              echo "tag=latest" >> $GITHUB_OUTPUT
            elif [[ "${GITHUB_REF}" == refs/heads/* ]]; then
              branch=${GITHUB_REF#refs/heads/}
              echo "tag=${branch}" >> $GITHUB_OUTPUT
            elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              tag=${GITHUB_REF#refs/tags/}
              echo "tag=${tag}" >> $GITHUB_OUTPUT
            else
              echo "tag=dev" >> $GITHUB_OUTPUT
            fi

        - name: Build and push Docker image to GHCR and Docker Hub
          uses: docker/build-push-action@v5
          with:
            context: .
            target: sipp
            push: true
            platforms: linux/amd64
            tags: |
              ghcr.io/${{ secrets.DOCKERHUB_USERNAME }}/sipp:${{ steps.extract_tag.outputs.tag }}
              ${{ secrets.DOCKERHUB_USERNAME }}/sipp:${{ steps.extract_tag.outputs.tag }}
            build-args: |
              DEBIAN_VERSION=${{ needs.load-env-vars.outputs.DEBIAN_VERSION }}
              SIPP_VERSION=${{ needs.load-env-vars.outputs.SIPP_VERSION }}
              BUILD_FLAGS=${{ needs.load-env-vars.outputs.BUILD_FLAGS }}
              SIPP_SCENARIOS_LOCATION=${{ needs.load-env-vars.outputs.SIPP_SCENARIOS_LOCATION }}
