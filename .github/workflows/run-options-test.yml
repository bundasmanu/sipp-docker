name: 'SIPp OPTIONS'
description: 'Run SIPp OPTIONS against a target (checkouts sipp-docker)'
inputs:
  remote_target:
    required: false
    default: '127.0.0.1:5060'
  num_reqs:
    required: false
    default: '1'
  call_rate:
    required: false
    default: '1'
  call_period:
    required: false
    default: '1000'
  sipp_repo:
    required: false
    default: 'bundasmanu/sipp-docker'
  sipp_ref:
    required: false
    default: 'main'
runs:
  using: 'composite'
  steps:
    - name: Checkout sipp-docker
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.sipp_repo }}
        ref: ${{ inputs.sipp_ref }}
        path: sipp-docker
    - name: Build SIPp image
      shell: bash
      run: |
        cd sipp-docker
        docker build --target sipp -t sipp:latest .
    - name: Run SIPp OPTIONS
      shell: bash
      run: |
        docker run --rm --network host \
          -v "${{ github.workspace }}/sipp-docker/sipp-scenarios:/opt" \
          sipp:latest sipp -i 127.0.0.1 -p 50600 ${{ inputs.remote_target }} \
          -r ${{ inputs.call_rate }} -rp ${{ inputs.call_period }} \
          -m ${{ inputs.num_reqs }} -sf /opt/options/options.xml
